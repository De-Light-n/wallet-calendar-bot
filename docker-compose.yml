services:
  app:
    build: .
    container_name: wallet_calendar_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      FINANCE_STUB_MODE: ${FINANCE_STUB_MODE:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:16-alpine
    container_name: wallet_calendar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    image: node:20-alpine
    container_name: wallet_calendar_frontend
    restart: unless-stopped
    working_dir: /frontend
    depends_on:
      - app
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      # Vite proxy inside Docker must reach the app container, not localhost
      API_TARGET: http://app:8000
    volumes:
      - ./frontend:/frontend
    command: sh -c "npm ci || npm install; npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
