<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід – Wallet Calendar Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #4a90d9; color: #fff; padding: 1rem 2rem; }
    header a { color: #fff; text-decoration: none; font-size: 1.2rem; font-weight: 700; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); text-align: center; }
    .card h2 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #2c3e50; }
    .card p { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 0.85rem 1.5rem; border-radius: 8px; border: 2px solid #ddd;
      background: #fff; color: #444; font-size: 1rem; font-weight: 600;
      text-decoration: none; transition: box-shadow 0.2s, border-color 0.2s; cursor: pointer;
    }
    .google-btn:hover { box-shadow: 0 2px 10px rgba(0,0,0,.15); border-color: #4a90d9; }
    .google-btn img { width: 22px; height: 22px; }
    .hint { margin-top: 1.5rem; font-size: 0.82rem; color: #999; }
    .telegram-hint { margin-top: 1rem; font-size: 0.88rem; color: #555; }
    .telegram-hint input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; margin-top: 0.4rem; }
    .telegram-hint label { display: block; text-align: left; font-weight: 600; margin-bottom: 0.25rem; }
    footer { text-align: center; padding: 1rem; color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header><a href="/">🤖 Wallet Calendar Bot</a></header>

  <main>
    <div class="card">
      <h2>Підключення</h2>
      <p>Авторизуйся через Google, щоб дати боту доступ до твого Календаря.</p>

      <div class="telegram-hint">
        <label for="tg_id">Твій Telegram ID (необов'язково):</label>
        <input type="number" id="tg_id" placeholder="Наприклад: 123456789" />
        <small style="color:#999;display:block;margin-top:0.3rem;">
          Отримай ID, відправивши /start боту <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a>
        </small>
      </div>

      <br/>
      <a id="google-login-btn" href="/auth/google" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Увійти з Google
      </a>

      <p class="hint">Ми запитаємо дозвіл на читання та редагування Google Calendar.</p>
    </div>
  </main>

  <footer>© 2024 Wallet Calendar Bot</footer>

  <script>
    const tgInput = document.getElementById('tg_id');
    const loginBtn = document.getElementById('google-login-btn');
    tgInput.addEventListener('input', () => {
      const val = tgInput.value.trim();
      loginBtn.href = val ? `/auth/google?telegram_id=${val}` : '/auth/google';
    });
  </script>
</body>
</html>
